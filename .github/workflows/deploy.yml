name: Deploy to Dreamhost

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pre-deploy checks
        run: |
          echo "Checking JS syntax..."
          node --check budget-tool.js
          echo "Checking internal links..."
          node tests/check-links.js
          echo "Running unit tests..."
          node tests/budget-tool.test.js

      # TODO: Remove this step after it has run once successfully
      - name: Clean up previously deployed internal files from server
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -p "${{ secrets.FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 22 \
            "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}" \
            'rm -rf "${{ secrets.FTP_REMOTE_PATH }}/docs" "${{ secrets.FTP_REMOTE_PATH }}/.github"'

      - name: Prepare deploy directory (exclude internal-only files)
        run: |
          mkdir -p _deploy
          rsync -a --exclude='_deploy' \
                   --exclude='docs/' \
                   --exclude='dump/' \
                   --exclude='.git/' \
                   --exclude='.github/' \
                   --exclude='*.md' \
                   --exclude='.claude/' \
                   --exclude='.mcp.json' \
                   ./ _deploy/

      - name: Deploy to Dreamhost via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: '_deploy/*'
          remote_path: ${{ secrets.FTP_REMOTE_PATH }}
          sftp_only: true
          delete_remote_files: false
