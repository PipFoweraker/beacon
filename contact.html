<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Beacon</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main>
        <div class="page-header">
            <h1>Contact</h1>
            <p class="page-subtitle">Get in touch with Beacon.</p>
        </div>

        <div class="content">
            <div id="form-status"></div>
            <form class="contact-form" action="/contact-handler.php" method="POST">
                <div class="form-group">
                    <label for="contact-name">Name</label>
                    <input type="text" id="contact-name" name="name" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="contact-email">Email</label>
                    <input type="email" id="contact-email" name="email" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="contact-subject">Subject</label>
                    <select id="contact-subject" name="subject" required>
                        <option value="" disabled selected>Select a topic</option>
                        <option value="General inquiry">General inquiry</option>
                        <option value="Fiscal sponsorship">Fiscal sponsorship</option>
                        <option value="Press and media">Press and media</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="contact-message">Message</label>
                    <textarea id="contact-message" name="message" rows="6" required></textarea>
                </div>

                <!-- Honeypot field — hidden from real users, catches bots -->
                <div class="form-hp" aria-hidden="true">
                    <label for="contact-website">Website</label>
                    <input type="text" id="contact-website" name="website" tabindex="-1" autocomplete="off">
                </div>

                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>

            <h2>Other ways to reach us</h2>
            <dl class="contact-info">
                <dt>Project proposals</dt>
                <dd><a href="/fiscal-sponsorship/apply.html">See our fiscal sponsorship page</a></dd>
            </dl>
        </div>
    </main>

    <script src="/components.js"></script>
    <script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var status = params.get('status');
        var el = document.getElementById('form-status');
        if (!el || !status) return;
        if (status === 'sent') {
            el.className = 'form-status success';
            el.textContent = 'Message sent. We\'ll get back to you soon.';
        } else if (status === 'error') {
            var reason = params.get('reason');
            var msg = 'Something went wrong. Please try again.';
            if (reason === 'missing') msg = 'Please fill in all fields.';
            else if (reason === 'email') msg = 'Please enter a valid email address.';
            else if (reason === 'rate') msg = 'Please wait a minute before sending another message.';
            el.className = 'form-status error';
            el.textContent = msg;
        }
    })();
    </script>
</body>
</html>
